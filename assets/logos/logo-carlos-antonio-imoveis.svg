<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Carlos Antônio Imóveis</title>
  <desc id="desc">Logomarca circular azul e dourada da Carlos Antônio Imóveis.</desc>
  <defs>
    <radialGradient id="blue" cx="52%" cy="45%" r="58%">
      <stop offset="0" stop-color="#095ce6"/>
      <stop offset="0.45" stop-color="#0732a5"/>
      <stop offset="1" stop-color="#001142"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
