  <path d="M210 660 C330 585 390 495 510 380 L648 507 L648 620 L836 620" fill="none" stroke="url(#gold)" stroke-width="55" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  <path d="M785 555 C865 500 955 490 1040 420 C996 500 960 575 900 642 C872 590 832 560 785 555Z" fill="url(#gold)" filter="url(#shadow)"/>
  <text x="600" y="790" text-anchor="middle" font-size="126" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="url(#gold)" stroke="#5f3300" stroke-width="3" filter="url(#shadow)">ANTÔNIO</text>
  <text x="600" y="1010" text-anchor="middle" font-size="125" font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="url(#gold)" stroke="#5f3300" stroke-width="3" filter="url(#shadow)">IMÓVEIS</text>
